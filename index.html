<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ID-Composer</title>
    <!-- 1. Meta tag for immediate redirection (content="0" means 0 seconds delay) -->
    <meta http-equiv="refresh" content="0; url=https://angericky.github.io/ID-Composer/">
    
    <!-- 2. Canonical link to tell search engines the new address -->
    <link rel="canonical" href="https://angericky.github.io/ID-Composer/">
    
    <!-- 3. JavaScript redirection as a backup -->
    <script type="text/javascript">
      window.location.href = "https://angericky.github.io/ID-Composer/";
    </script>
  </head>
  <body>
    <!-- 4. Manual link in case automatic redirection fails -->
    <p>Redirecting... If you are not redirected automatically, please <a href="https://angericky.github.io/ID-Composer/">click here</a>.</p>
  </body>
</html>
